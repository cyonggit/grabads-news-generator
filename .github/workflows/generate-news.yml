name: Generate SEA Ad News

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser python-dateutil requests

      - name: Generate news.json
        run: python generate_news.py

      - name: Verify news.json was created
        run: |
          echo "news.json preview:"
          head -30 news.json

      - name: Save news.json to temp location
        run: cp news.json /tmp/news.json

      - name: Publish news.json to gh-pages branch
        run: |
          git config user.email "github-actions-bot@grabads"
          git config user.name "GrabAds Bot"

          # Switch to gh-pages branch or create it fresh
          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          # Copy news.json from temp location
          cp /tmp/news.json ./news.json

          # Commit and push
          git add news.json
          git diff --cached --quiet && echo "No changes to news.json." || git commit -m "chore: update news.json"
          git push origin gh-pages
          echo "news.json published successfully!"
